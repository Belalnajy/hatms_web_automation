<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HATMS Web</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <div class="background-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <main class="glass-container container">
      <header class="header">
        <h1>🚀 مجتاز الآلي</h1>
        <p>
          أدخل كود الجلسة <span class="monospaced">(MoodleSession)</span> لتبدأ
          الأتمتة التلقائية خلف الكواليس.
        </p>
      </header>

      <section class="controls">
        <div class="input-group">
          <input
            type="text"
            id="cookie-input"
            placeholder="MoodleSession=..."
            autocomplete="off" />
          <button id="start-btn" class="btn primary-btn">
            <span class="btn-text">بدء التشغيل</span>
            <span class="btn-loader hidden">...</span>
          </button>
        </div>
        <div id="status-indicator" class="status-indicator">
          الوضع: بانتظار الإدخال
        </div>
      </section>

      <section class="terminal-container">
        <div class="terminal-header">
          <div class="mac-btns">
            <span class="mac-btn close"></span>
            <span class="mac-btn min"></span>
            <span class="mac-btn max"></span>
          </div>
          <div class="terminal-title">شاشة المخرجات (Live Console)</div>
        </div>
        <div class="terminal-body" id="terminal-body">
          <div class="log-line welcome-msg">أهلاً بك. النظام جاهز للبدء...</div>
        </div>
      </section>

      <!-- ═══ History Section ═══ -->
      <section class="history-section">
        <div class="history-header" id="history-toggle">
          <div class="history-title-area">
            <span class="history-icon">📜</span>
            <h2 class="history-title">سجل الحسابات</h2>
            <span class="history-badge" id="history-count">0</span>
          </div>
          <span class="history-chevron">▼</span>
        </div>
        <div class="history-content collapsed" id="history-content">
          <div id="history-empty" class="history-empty">
            <span class="empty-icon">📭</span>
            <p>لا يوجد سجل بعد. ابدأ أول أتمتة!</p>
          </div>
          <div id="history-list" class="history-list"></div>
          <button id="clear-history-btn" class="btn danger-btn hidden">
            🗑️ مسح الكل
          </button>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
